    Research Experience:
      - company: University of California, Berkeley
        position: Graduate Research Assistant — Advisor Robert Pilawa-Podgurski
        location: Berkeley, CA
        start_date: 2021-01
        end_date: 2026-05
        highlights:
          - Developed and experimentally evaluated control algorithms for the FCML converter utilizing active flying capacitor voltage balancing to enable buck-type PFC rectifiers.
          - Analyzed circuit dynamics and relevant parasitics of the FCML converter to characterize underlying dynamic behavior.
          - Developed a high-performance FCML converter testbed to validate high-bandwidth controls and flying capacitor voltage estimation using a single voltage sensor.
          - Integrated multiple high-performance FCML converter prototypes and developed motor control algorithms and firmware to enable a dynamometer testbed for high level count FCML converters.

      - company: Massachusetts Institute of Technology
        position: Graduate Research Assistant — Advisor David J. Perreault
        location: Cambridge, MA
        start_date: 2020-01
        end_date: 2020-12
        highlights:
          - Designed and manufactured a high-efficiency, radio-frequency inductor for high-current applications.
          - Designed a high-accuracy test fixture to characterize RF high-quality-factor inductors at high currents.

      - company: Massachusetts Institute of Technology
        position: Undergraduate Research Assistant — Advisor David J. Perreault
        location: Cambridge, MA
        start_date: 2018-01
        end_date: 2019-12
        highlights:
          - Characterized core losses of high-frequency magnetic materials for power stage components operated at high frequencies.

